spring:
  application:
    name: expense-management-service

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        show_sql: false
    open-in-view: false

  h2:
    console:
      enabled: false

  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  quartz:
    job-store-type: memory
    properties:
      org.quartz.threadPool.threadCount: 5
      org.quartz.threadPool.threadPriority: 5
      org.quartz.jobStore.class: org.quartz.simpl.RAMJobStore
      org.quartz.plugin.triggers.class: org.quartz.plugins.management.ShutdownHookPlugin

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.expenseapp: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.quartz: INFO

app:
  jwt:
    secret: "test-secret-key-for-unit-testing-only-not-for-production-use"
    expiration: 86400
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:8080"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
    allowed-headers: "*"
    allow-credentials: true