version: 2.1

orbs:
  maven: circleci/maven@2.1.0

executors:
  java-executor:
    docker:
      - image: cimg/openjdk:17.0.0
    environment:
      JVM_OPTS: -Xmx3200m
      TERM: dumb

jobs:
  build-and-test:
    executor: java-executor
    steps:
      - checkout
      
      - restore_cache:
          keys:
            - maven-cache-{{ checksum "pom.xml" }}
            - maven-cache-
      
      - run:
          name: Build and Run Tests
          command: mvn clean verify -B
      
      - save_cache:
          paths:
            - ~/.m2
          key: maven-cache-{{ checksum "pom.xml" }}
      
      - store_test_results:
          path: target/surefire-reports
      
      - store_artifacts:
          path: target/surefire-reports
          destination: test-results
      
      - store_artifacts:
          path: target
          destination: build-artifacts

workflows:
  build-and-test:
    jobs:
      - build-and-test
